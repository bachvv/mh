<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- Flat Court: flat outside top/bottom, curved inner profile -->
  <path d="M34,22 L86,22 Q86,22 86,40 Q86,58 86,58 L34,58 Q34,58 34,40 Q34,22 34,22 Z" fill="none" stroke="#c49a3c" stroke-width="5" stroke-linejoin="round"/>
  <!-- curved inner cutout to show comfort fit -->
  <path d="M34,28 Q60,40 86,28" fill="none" stroke="#c49a3c" stroke-width="2" stroke-dasharray="3,3"/>
  <path d="M34,52 Q60,40 86,52" fill="none" stroke="#c49a3c" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="60" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#666">FLAT COURT</text>
</svg>
