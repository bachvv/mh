<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- Vertical Side Bevel Cut: flat band with a vertical bevel cut on the sides -->
  <rect x="32" y="24" width="56" height="32" fill="none" stroke="#c49a3c" stroke-width="5" stroke-linejoin="miter"/>
  <!-- vertical bevel cut lines on each side -->
  <line x1="44" y1="24" x2="44" y2="56" stroke="#010101" stroke-width="2"/>
  <line x1="76" y1="24" x2="76" y2="56" stroke="#010101" stroke-width="2"/>
  <text x="60" y="74" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.2" font-weight="600" letter-spacing="0.03em" fill="#666">VERTICAL SIDE BEVEL CUT</text>
</svg>
