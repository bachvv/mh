<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- Bevel Two Tone: flat with bevel edges, two-tone finish shown by fill split -->
  <polygon points="42,22 78,22 88,32 88,48 78,58 42,58 32,48 32,32" fill="none" stroke="#c49a3c" stroke-width="5" stroke-linejoin="miter"/>
  <!-- centre brushed zone -->
  <rect x="42" y="22" width="36" height="36" fill="rgba(196,154,60,0.12)"/>
  <text x="60" y="74" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.04em" fill="#666">BEVEL TWO TONE</text>
</svg>
