<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- Round High Dome: nearly full circle, very rounded on both sides -->
  <ellipse cx="60" cy="44" rx="30" ry="28" fill="none" stroke="#c49a3c" stroke-width="5"/>
  <!-- flat bottom cut -->
  <rect x="30" y="60" width="60" height="12" fill="#f5f0e8"/>
  <line x1="30" y1="60" x2="90" y2="60" stroke="#010101" stroke-width="2"/>
  <text x="60" y="76" text-anchor="middle" font-family="Inter,sans-serif" font-size="7.5" font-weight="600" letter-spacing="0.05em" fill="#666">ROUND HIGH DOME</text>
</svg>
