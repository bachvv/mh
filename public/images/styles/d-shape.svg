<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- D-Shape cross section: flat inside, domed outside -->
  <path d="M38,20 L38,60 Q82,60 82,40 Q82,20 38,20 Z" fill="none" stroke="#c49a3c" stroke-width="5" stroke-linejoin="round"/>
  <!-- inner flat edge highlight -->
  <line x1="38" y1="20" x2="38" y2="60" stroke="#010101" stroke-width="2"/>
  <text x="60" y="75" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#666" text-transform="uppercase">D-SHAPE</text>
</svg>
