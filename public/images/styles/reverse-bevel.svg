<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <rect width="120" height="80" fill="#f5f0e8"/>
  <!-- Reverse Bevel: outer edges angle inward (reverse chamfer) -->
  <polygon points="36,22 84,22 88,32 88,48 84,58 36,58 32,48 32,32" fill="none" stroke="#c49a3c" stroke-width="5" stroke-linejoin="miter"/>
  <!-- inner bevel lines to show reverse direction -->
  <line x1="36" y1="22" x2="44" y2="30" stroke="#c49a3c" stroke-width="2" opacity="0.5"/>
  <line x1="84" y1="22" x2="76" y2="30" stroke="#c49a3c" stroke-width="2" opacity="0.5"/>
  <line x1="36" y1="58" x2="44" y2="50" stroke="#c49a3c" stroke-width="2" opacity="0.5"/>
  <line x1="84" y1="58" x2="76" y2="50" stroke="#c49a3c" stroke-width="2" opacity="0.5"/>
  <text x="60" y="74" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" letter-spacing="0.06em" fill="#666">REVERSE BEVEL</text>
</svg>
